name: VM2026 Auto Update

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 16 10,16,21,24,28 6 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests pandas numpy scipy beautifulsoup4
      
      - name: Run update script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd 1 && python3 update.py
      
      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "VM2026 Bot"
          git pull --rebase origin main
          git add 1/predictions.json 1/vm2026_dashboard.html 1/matches_config.json
          git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')"
          git push
